<!DOCTYPE html>
<html>
<head>
    <title>Smart Railway Gates</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            background:#041033;
            color:white;
            font-family:Arial;
            margin:0;
            padding:20px;
        }

        h1{
            color:#37b6ff;
            font-size:42px;
        }

        .card{
            background:#0d1b4d;
            padding:20px;
            border-radius:20px;
            margin-top:25px;
            box-shadow:0 0 10px rgba(0,0,0,0.4);
        }

        .status{
            font-size:32px;
            font-weight:bold;
            margin-top:10px;
        }

        .open{
            color:#00ff7f;
        }

        .closed{
            color:red;
        }

        .unknown{
            color:orange;
        }

        .info{
            font-size:22px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:15px;
            background:#37b6ff;
            color:white;
            font-size:22px;
            margin-top:20px;
        }

    </style>
</head>

<body>

    <h1>🚆 Smart Railway Gates</h1>

    <div class="card">

        <h2>Gate 1</h2>

        <div id="status1" class="status unknown">
            CHECKING...
        </div>

        <div id="waiting1" class="info">
            Waiting Users: 0
        </div>

        <div id="updated1" class="info">
            Last Updated: --
        </div>

    </div>

    <div class="card">

        <h2>Gate 2</h2>

        <div id="status2" class="status unknown">
            CHECKING...
        </div>

        <div id="waiting2" class="info">
            Waiting Users: 0
        </div>

        <div id="updated2" class="info">
            Last Updated: --
        </div>

    </div>

    <button onclick="openLocationSettings()">
        Enable Location
    </button>

<script>

function openLocationSettings(){

    alert("Please enable GPS/location from phone settings");
}

function updateData(){

    fetch("/data")
    .then(response => response.json())
    .then(data => {

        updateGate(
            "1",
            data.gate1.status,
            data.gate1.waiting_users,
            data.gate1.last_updated
        );

        updateGate(
            "2",
            data.gate2.status,
            data.gate2.waiting_users,
            data.gate2.last_updated
        );
    });
}

function updateGate(number,status,waiting,updated){

    let statusElement =
        document.getElementById("status"+number);

    statusElement.innerHTML = status;

    if(status=="OPEN"){
        statusElement.className = "status open";
    }

    else if(status=="CLOSED"){
        statusElement.className = "status closed";
    }

    else{
        statusElement.className = "status unknown";
    }

    document.getElementById(
        "waiting"+number
    ).innerHTML =
        "Waiting Users: " + waiting;

    document.getElementById(
        "updated"+number
    ).innerHTML =
        "Last Updated: " + updated;
}

navigator.geolocation.watchPosition(

function(position){

    fetch("/location",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            latitude:position.coords.latitude,
            longitude:position.coords.longitude,
            speed:position.coords.speed || 0

        })

    });

},

function(error){

    console.log(error);

},

{
    enableHighAccuracy:true
}

);

setInterval(updateData,3000);

updateData();

</script>

</body>
</html>
