<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Gate</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      margin-top:20px;
      font-size:40px;
      color:#00d4ff;
    }

    .card{
      background:#1f2937;
      padding:25px;
      border-radius:20px;
      margin-top:30px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:18px;
      border:none;
      border-radius:12px;
      background:#00b894;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#00a383;
    }

    #status{
      margin-top:20px;
      font-size:22px;
      color:#facc15;
    }

    #location{
      margin-top:20px;
      font-size:18px;
      line-height:1.8;
    }

    iframe{
      width:100%;
      height:350px;
      border:none;
      border-radius:20px;
      margin-top:20px;
    }
  </style>
</head>

<body>

  <h1>Smart Gate</h1>

  <div class="card">

    <h2>Live User Location</h2>

    <button onclick="getLocation()">
      Turn ON Location
    </button>

    <div id="status"></div>

    <div id="location"></div>

    <iframe
      id="map"
      src=""
      allowfullscreen>
    </iframe>

  </div>

  <script>

    function getLocation(){

      document.getElementById("status").innerHTML =
        "Getting Location...";

      if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

          showPosition,
          showError,

          {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
          }

        );

      }else{

        document.getElementById("status").innerHTML =
          "Geolocation not supported.";

      }
    }

    function showPosition(position){

      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      document.getElementById("status").innerHTML =
        "Location Found Successfully";

      document.getElementById("location").innerHTML =
        "<b>Latitude:</b> " + lat +
        "<br><b>Longitude:</b> " + lon;

      document.getElementById("map").src =
        "https://maps.google.com/maps?q="
        + lat + "," + lon +
        "&z=15&output=embed";
    }

    function showError(error){

      switch(error.code){

        case error.PERMISSION_DENIED:

          document.getElementById("status").innerHTML =
            "Location Permission Denied";
          break;

        case error.POSITION_UNAVAILABLE:

          document.getElementById("status").innerHTML =
            "Location Unavailable";
          break;

        case error.TIMEOUT:

          document.getElementById("status").innerHTML =
            "Request Timed Out";
          break;

        default:

          document.getElementById("status").innerHTML =
            "Unknown Error";
      }
    }

  </script>

</body>
</html>
