<!DOCTYPE html>
<html>

<head>

<title>Railway Gate Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>Railway Gate Tracker</h1>

    <!-- USER INFO -->

    <div class="user-box">

        <h2>Your Info</h2>

        <p id="locationText">

            Searching GPS...

        </p>

        <p id="speedText">

            Speed: 0 km/h

        </p>

    </div>

    <!-- GATE 1 -->

    <div class="gate-card clickable"

        onclick="openRoute(
            15.1514586,
            76.8938312
        )">

        <h2>Cantonment Gate</h2>

        <p id="distance1">

            Distance: --

        </p>

        <p id="waiting1">

            Waiting Users: 0

        </p>

        <div id="status1" class="status unknown">

            NO DATA

        </div>

        <button class="route-btn">

            Open Route

        </button>

    </div>

    <!-- GATE 2 -->

    <div class="gate-card clickable"

        onclick="openRoute(
            15.1445935,
            76.9047562
        )">

        <h2>Radio Park Gate</h2>

        <p id="distance2">

            Distance: --

        </p>

        <p id="waiting2">

            Waiting Users: 0

        </p>

        <div id="status2" class="status unknown">

            NO DATA

        </div>

        <button class="route-btn">

            Open Route

        </button>

    </div>

    <!-- GOOGLE MAP -->

    <div class="map-card">

        <h2>Live Google Map</h2>

        <iframe

            id="mapFrame"

            width="100%"

            height="350"

            style="border:0; border-radius:20px;"

            loading="lazy"

            allowfullscreen

            referrerpolicy="no-referrer-when-downgrade"

            src="https://maps.google.com/maps?q=15.1514586,76.8938312&z=15&output=embed">

        </iframe>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
